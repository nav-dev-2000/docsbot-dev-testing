name: Core tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  core-tests:
    runs-on: ubuntu-latest
    env:
      DISABLE_HEADLESS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint application
        run: npm run lint

      - name: Run core test suite
        run: npm run test:core
